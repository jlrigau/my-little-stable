<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🤠 Mon Ranch du Far West</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Écran de démarrage -->
  <div id="ecran-accueil" class="ecran">
    <div class="boite-accueil">
      <h1 class="titre-jeu">🤠 Mon Ranch</h1>
      <p class="sous-titre">Promène-toi dans ton ranch du Far West et occupe-toi de tes chevaux&nbsp;!</p>
      <label class="label-nom" for="nom-haras">Comment s'appelle ton ranch&nbsp;?</label>
      <input id="nom-haras" type="text" maxlength="20" placeholder="Le Ranch du Canyon Doré" />
      <button id="btn-commencer" class="bouton bouton-geant">▶️ Commencer l'aventure</button>
      <button id="btn-charger" class="bouton bouton-secondaire">📂 Continuer ma partie</button>
      <p id="msg-accueil" class="msg-accueil"></p>
    </div>
  </div>

  <!-- Jeu principal -->
  <div id="ecran-jeu" class="ecran cache">
    <header class="barre-haut">
      <div class="titre-haras">🤠 <span id="aff-nom-haras">Mon Ranch</span> <small id="aff-niveau" class="aff-niveau"></small></div>
      <div class="ressources">
        <span class="ressource" title="Dollars">💰 <b id="aff-pieces">0</b></span>
        <span class="ressource" title="Bottes de foin">🌾 <b id="aff-carottes">0</b></span>
        <span class="ressource" title="Jour">📅 J<b id="aff-jour">1</b></span>
        <span class="ressource" title="Chevaux / box">🐴 <b id="aff-boxes">0/0</b></span>
        <button id="btn-objectifs" class="mini-bouton" title="Objectifs">🏆</button>
        <button id="btn-aide" class="mini-bouton" title="Aide">❓</button>
      </div>
    </header>

    <div id="message-jeu" class="message-jeu cache"></div>

    <div class="zone-monde">
      <canvas id="monde" width="960" height="640"></canvas>

      <!-- Manette tactile -->
      <div id="dpad" class="dpad">
        <button class="dpad-btn haut" data-dir="haut">▲</button>
        <button class="dpad-btn gauche" data-dir="gauche">◀</button>
        <button class="dpad-btn droite" data-dir="droite">▶</button>
        <button class="dpad-btn bas" data-dir="bas">▼</button>
      </div>
      <button id="btn-action" class="btn-action cache">Action</button>
    </div>

    <!-- Panneau contextuel (s'occuper d'un cheval / entrer dans un bâtiment) -->
    <div id="panneau" class="panneau">
      <p class="panneau-aide">Promène-toi 🚶 et approche-toi d'un cheval ou d'un bâtiment pour agir.</p>
    </div>
  </div>

  <!-- Fenêtre modale réutilisable -->
  <div id="modale" class="modale cache">
    <div class="modale-contenu">
      <button id="btn-fermer-modale" class="btn-fermer">✖</button>
      <h2 id="modale-titre">Titre</h2>
      <div id="modale-corps"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
