<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ffce8f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mon Centre Équestre" />
  <title>🐴 Mon Centre Équestre</title>
  <link rel="icon" type="image/png" href="assets/favicon.png?v=ph37" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=ph37" />
  <link rel="stylesheet" href="style.css?v=ph39" />
</head>
<body>
  <!-- Accueil -->
  <div id="ecran-accueil" class="ecran">
    <div class="boite-accueil">
      <h1 class="titre-jeu">🐴 Mon Centre Équestre</h1>
      <p class="sous-titre">Crée ton personnage et occupe-toi de tes chevaux dans ton centre équestre&nbsp;!</p>
      <label class="label-nom" for="nom-haras">Le nom de ton centre&nbsp;:</label>
      <input id="nom-haras" type="text" maxlength="20" placeholder="Les Écuries du Pré Vert" />
      <button id="btn-commencer" class="bouton bouton-geant">▶️ Nouvelle partie</button>
      <button id="btn-charger" class="bouton bouton-secondaire">📂 Continuer ma partie</button>
      <p id="msg-accueil" class="msg-accueil"></p>
      <button id="btn-refresh" class="btn-refresh" title="Vider le cache et recharger">🔄 Rafraîchir (vider le cache)</button>
    </div>
  </div>

  <!-- Création du personnage -->
  <div id="ecran-creation" class="ecran cache">
    <div class="boite-creation">
      <h2>🎨 Choisis ton personnage</h2>
      <div id="apercu-perso" class="apercu-perso"></div>
      <div id="creation-controles" class="creation-controles"></div>
      <button id="btn-creation-ok" class="bouton bouton-geant">✅ C'est parti&nbsp;!</button>
    </div>
  </div>

  <!-- Jeu -->
  <div id="ecran-jeu" class="ecran cache">
    <header class="barre-haut">
      <div class="titre-haras">🐴 <span id="aff-nom-haras">Mon Centre</span></div>
      <div class="ressources">
        <span class="ressource" title="Dollars">💰 <b id="aff-pieces">0</b></span>
        <span class="ressource" title="Bottes de foin">🌾 <b id="aff-foin">0</b></span>
        <span class="ressource" title="Jour">📅 J<b id="aff-jour">1</b></span>
        <span class="ressource" title="Chevaux / box">🐴 <b id="aff-boxes">0/0</b></span>
        <button id="btn-moi" class="mini-bouton" title="Changer mon apparence">🧍</button>
        <button id="btn-aide" class="mini-bouton" title="Aide">❓</button>
      </div>
    </header>

    <div id="message-jeu" class="message-jeu cache"></div>

    <div class="zone-monde">
      <div id="monde"></div>
      <button id="btn-action" class="btn-action cache">Action</button>
    </div>

    <div id="panneau" class="panneau">
      <p class="panneau-aide">Promène-toi 🚶 et approche-toi d'un cheval ou d'un bâtiment pour agir.</p>
    </div>
  </div>

  <!-- Modale -->
  <div id="modale" class="modale cache">
    <div class="modale-contenu">
      <button id="btn-fermer-modale" class="btn-fermer">✖</button>
      <h2 id="modale-titre">Titre</h2>
      <div id="modale-corps"></div>
    </div>
  </div>

  <!-- Voile de nuit (transition « dormir »), plein écran -->
  <div id="nuit-voile"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="game.js?v=ph39"></script>
</body>
</html>
