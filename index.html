<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🐴 Mon Ranch</title>
  <link rel="stylesheet" href="style.css?v=lpc2" />
</head>
<body>
  <!-- Accueil -->
  <div id="ecran-accueil" class="ecran">
    <div class="boite-accueil">
      <h1 class="titre-jeu">🐴 Mon Ranch</h1>
      <p class="sous-titre">Choisis ton personnage et occupe-toi de tes chevaux&nbsp;!</p>
      <label class="label-nom" for="nom-haras">Le nom de ton ranch&nbsp;:</label>
      <input id="nom-haras" type="text" maxlength="20" placeholder="Le Ranch des Étoiles" />
      <button id="btn-commencer" class="bouton bouton-geant">▶️ Nouvelle partie</button>
      <button id="btn-charger" class="bouton bouton-secondaire">📂 Continuer ma partie</button>
      <p id="msg-accueil" class="msg-accueil"></p>
    </div>
  </div>

  <!-- Choix du personnage -->
  <div id="ecran-creation" class="ecran cache">
    <div class="boite-creation">
      <h2>🧒 Choisis ton personnage</h2>
      <div id="char-grid" class="char-grid"></div>
      <button id="btn-creation-ok" class="bouton bouton-geant">✅ C'est parti&nbsp;!</button>
    </div>
  </div>

  <!-- Jeu -->
  <div id="ecran-jeu" class="ecran cache">
    <header class="barre-haut">
      <div class="titre-haras">🐴 <span id="aff-nom-haras">Mon Ranch</span></div>
      <div class="ressources">
        <span class="ressource" title="Pièces">💰 <b id="aff-pieces">0</b></span>
        <span class="ressource" title="Foin">🌾 <b id="aff-foin">0</b></span>
        <span class="ressource" title="Jour">📅 J<b id="aff-jour">1</b></span>
        <span class="ressource" title="Chevaux / box">🐴 <b id="aff-boxes">0/0</b></span>
        <button id="btn-moi" class="mini-bouton" title="Changer de personnage">🧒</button>
        <button id="btn-aide" class="mini-bouton" title="Aide">❓</button>
      </div>
    </header>

    <div id="message-jeu" class="message-jeu cache"></div>

    <div class="zone-monde">
      <div id="monde"></div>
      <div id="dpad" class="dpad">
        <button class="dpad-btn haut" data-dir="haut">▲</button>
        <button class="dpad-btn gauche" data-dir="gauche">◀</button>
        <button class="dpad-btn droite" data-dir="droite">▶</button>
        <button class="dpad-btn bas" data-dir="bas">▼</button>
      </div>
      <button id="btn-action" class="btn-action cache">Action</button>
    </div>

    <div id="panneau" class="panneau">
      <p class="panneau-aide">Promène-toi 🚶 et approche-toi d'un cheval ou d'un bâtiment.</p>
    </div>
  </div>

  <!-- Modale -->
  <div id="modale" class="modale cache">
    <div class="modale-contenu">
      <button id="btn-fermer-modale" class="btn-fermer">✖</button>
      <h2 id="modale-titre">Titre</h2>
      <div id="modale-corps"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="game.js?v=lpc2"></script>
</body>
</html>
