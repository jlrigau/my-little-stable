name: Déployer sur GitHub Pages

on:
  push:
    branches:
      - main
      - claude/horse-stable-sim-game-brr28d
  workflow_dispatch:

# Permissions nécessaires au déploiement sur GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Pages
        uses: actions/configure-pages@v5
        with:
          # Active automatiquement GitHub Pages (source « GitHub Actions »)
          # si ce n'est pas déjà fait, évitant toute manipulation manuelle.
          enablement: true

      - name: Téléverser le site
        uses: actions/upload-pages-artifact@v3
        with:
          # Le site est statique et se trouve à la racine du dépôt.
          path: "."

      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
